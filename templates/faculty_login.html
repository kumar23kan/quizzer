<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizzer — Faculty Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2d3148;
    --accent: #6c63ff;
    --accent-hover: #5a52e0;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --error-bg: #2d1a1a;
    --error-border: #c0392b;
    --error-text: #ff6b6b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-icon {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.25rem;
    text-align: center;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }

  .error-box {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    color: var(--error-text);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-size: 0.75rem;
  }

  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
  }

  button[type="submit"] {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  button[type="submit"]:hover {
    background: var(--accent-hover);
  }

  button[type="submit"]:active {
    transform: scale(0.98);
  }

  .footer-note {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🎓</span>
      <h1>Quizzer</h1>
      <p class="subtitle">Faculty Dashboard Login</p>
    </div>

    {% if error %}
    <div class="error-box">
      <span>⚠</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/faculty/login">
      <div class="form-group">
        <label for="password">Faculty Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autofocus
          required
        >
      </div>
      <button type="submit">Login</button>
    </form>

    <p class="footer-note">Students: connect to the classroom WiFi and visit the main page.</p>
  </div>
</body>
</html>
